name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release; leave blank to use the manifest version'
        required: false
        type: string
      draft:
        description: 'Create the GitHub release as a draft'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate release version
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      draft: ${{ steps.version.outputs.draft }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve version
        id: version
        shell: bash
        run: |
          MANIFEST_VERSION="$(python3 -c 'import json; print(json.load(open("src-tauri/tauri.conf.json"))["version"])')"
          CARGO_VERSION="$(sed -n 's/^version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' src-tauri/Cargo.toml | head -n1)"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_VERSION="${{ github.event.inputs.version }}"
            DRAFT="${{ github.event.inputs.draft }}"
            RAW_VERSION="${RAW_VERSION#"${RAW_VERSION%%[![:space:]]*}"}"
            RAW_VERSION="${RAW_VERSION%"${RAW_VERSION##*[![:space:]]}"}"
            if [ -z "$RAW_VERSION" ]; then
              RAW_VERSION="$MANIFEST_VERSION"
            fi
          else
            RAW_VERSION="${GITHUB_REF#refs/tags/}"
            DRAFT="true"
          fi

          VERSION="${RAW_VERSION#v}"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error title=Invalid release version::Version input '$RAW_VERSION' must look like 1.0.0, v1.0.0, 1.0.0-beta.1, or v1.0.0-beta.1. Leave the manual input blank to use the manifest version $MANIFEST_VERSION."
            exit 1
          fi

          TAG_VERSION="$VERSION"

          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ] || [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error title=Release version mismatch::Requested version '$TAG_VERSION' must match src-tauri/tauri.conf.json=$MANIFEST_VERSION and src-tauri/Cargo.toml=$CARGO_VERSION. Leave the manual input blank to use the manifest version."
            exit 1
          fi

          if [[ "$TAG_VERSION" == *-* ]]; then
            PRERELEASE="true"
          else
            PRERELEASE="false"
          fi

          echo "version=v$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "draft=$DRAFT" >> "$GITHUB_OUTPUT"

  checks:
    name: Release quality gates
    needs: validate
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: release-quality

      - name: Install Linux/Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf \
            rpm

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Run Clippy
        working-directory: src-tauri
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test --locked --all-features

      - name: Install Svelte frontend dependencies
        run: npm ci --prefix frontend

      - name: Run frontend checks
        run: npm run check

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Audit Rust dependencies
        working-directory: src-tauri
        run: |
          cargo audit --deny warnings \
            --ignore RUSTSEC-2024-0370 \
            --ignore RUSTSEC-2024-0411 \
            --ignore RUSTSEC-2024-0412 \
            --ignore RUSTSEC-2024-0413 \
            --ignore RUSTSEC-2024-0414 \
            --ignore RUSTSEC-2024-0415 \
            --ignore RUSTSEC-2024-0416 \
            --ignore RUSTSEC-2024-0417 \
            --ignore RUSTSEC-2024-0418 \
            --ignore RUSTSEC-2024-0419 \
            --ignore RUSTSEC-2024-0420 \
            --ignore RUSTSEC-2024-0429 \
            --ignore RUSTSEC-2025-0075 \
            --ignore RUSTSEC-2025-0080 \
            --ignore RUSTSEC-2025-0081 \
            --ignore RUSTSEC-2025-0098 \
            --ignore RUSTSEC-2025-0100

  build:
    name: Build ${{ matrix.name }}
    needs: [validate, checks]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Svelte frontend dependencies
        run: npm ci --prefix frontend

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}-release

      - name: Install Linux/Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            patchelf \
            rpm

      - name: Resolve updater signing mode
        id: signing
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          RELEASE_DRAFT: ${{ needs.validate.outputs.draft }}
        run: |
          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "config_args=" >> "$GITHUB_OUTPUT"
            echo "upload_updater=true" >> "$GITHUB_OUTPUT"
          elif [ "$RELEASE_DRAFT" = "false" ]; then
            echo "::error title=Missing updater signing secret::The TAURI_SIGNING_PRIVATE_KEY repository secret is required before publishing a signed updater release."
            echo "::error::Generate it with 'cargo tauri signer generate --write-keys .secrets/simplefile-updater.key', then store the private key content as the repository secret."
            exit 1
          else
            echo "::warning title=Unsigned draft release::TAURI_SIGNING_PRIVATE_KEY is not configured. Building draft installer artifacts only; updater artifacts, signatures, and latest.json will be skipped."
            echo "config_args=--config src-tauri/tauri.local.conf.json" >> "$GITHUB_OUTPUT"
            echo "upload_updater=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@action-v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.validate.outputs.version }}
          releaseName: SimpleFile ${{ needs.validate.outputs.version }}
          releaseBody: |
            ## SimpleFile ${{ needs.validate.outputs.version }}

            Linux installers are attached below.
            See [docs/CHANGELOG.md](https://github.com/conniecombs/SimpleFile-Linux/blob/main/docs/CHANGELOG.md) for release notes and upgrade details.
          releaseDraft: true
          prerelease: ${{ needs.validate.outputs.prerelease }}
          uploadUpdaterJson: ${{ steps.signing.outputs.upload_updater }}
          uploadUpdaterSignatures: ${{ steps.signing.outputs.upload_updater }}
          updaterJsonPreferNsis: true
          args: --target ${{ matrix.target }} ${{ steps.signing.outputs.config_args }}

  publish:
    name: Publish release
    needs: [validate, build]
    if: needs.validate.outputs.draft == 'false'
    runs-on: ubuntu-22.04
    steps:
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.validate.outputs.version }}
          draft: false
          prerelease: ${{ needs.validate.outputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
